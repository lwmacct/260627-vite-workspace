name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Pack
        run: |
          mkdir -p tmp/npm
          npm pack --pack-destination tmp/npm
          mv tmp/npm/*.tgz tmp/npm/package.tar.gz

      - name: Publish to npm
        run: npm publish tmp/npm/package.tar.gz --provenance --access public

      - name: Publish Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: tmp/npm/package.tar.gz
